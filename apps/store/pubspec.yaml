name: emartstore
description: A new Flutter application.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.2+2

environment:
  sdk: ">=3.4.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.5.2
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_messaging: ^15.2.4
  cloud_firestore: ^5.6.5
  firebase_database: ^11.3.4
  firebase_app_check: ^0.3.2+4
  firebase_storage: ^12.4.4
  firebase_crashlytics: ^4.3.2
  flutter_local_notifications: ^18.0.1
  geocoding: ^3.0.0
  googleapis_auth: ^1.6.0
  get: ^4.7.2
  smooth_page_indicator: ^1.2.0+3
  datetime_picker_formfield_new: ^2.1.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  intl_phone_number_input: ^0.7.4
  pin_code_fields: ^8.0.1
  easy_localization: ^3.0.7+1
  font_awesome_flutter: ^10.8.0
  photo_view: ^0.15.0
  the_apple_sign_in: ^1.1.1
  numberpicker: ^2.1.2
  location: ^8.0.0
  dotted_border: ^2.1.0
  video_player: ^2.9.3
  get_thumbnail_video: ^0.7.3
  video_compress: ^3.1.4
  path_provider: ^2.1.5
  sticky_headers: ^0.3.0+2
  google_maps_flutter: ^2.10.1
  dropdown_search: ^5.0.6
  audioplayers: ^6.2.0
  esc_pos_utils: any
  print_bluetooth_thermal: ^1.1.6
  flutter_widget_from_html: ^0.15.3
  flutter_rating_bar: ^4.0.1
  file_picker: ^8.3.1
  flutter_multi_formatter: ^2.13.0
  mailer: ^6.4.1
  google_maps_place_picker_mb: ^3.1.2
  flutter_easyloading: ^3.0.5
  qr_flutter: ^4.1.0
  flutter_svg: ^2.0.17
  syncfusion_flutter_datepicker: ^28.2.9
  syncfusion_flutter_pdf: ^28.2.11

  osm_nominatim: ^3.0.1
  flutter_osm_plugin: ^1.3.6

  flutter_stripe: ^11.4.0
  razorpay_flutter: ^1.4.0
  flutter_paypal: ^0.2.1
  permission_handler: ^11.4.0


dependency_overrides:
  uuid: ^4.5.1
  http: ^1.3.0
  web: ^1.1.0
  google_api_headers: ^4.4.1
  package_info_plus: ^8.3.0
  geolocator: ^13.0.2

flutter:

  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/translations/
    - assets/flags/
    - assets/icons/

  fonts:
    - family: RadioCanadaBig-Bold
      fonts:
        - asset: assets/fonts/RadioCanadaBig-Bold.ttf

    - family: Metropolis-Medium
      fonts:
        - asset: assets/fonts/RadioCanadaBig-Medium.ttf

    - family: RadioCanadaBig-Regular
      fonts:
        - asset: assets/fonts/RadioCanadaBig-Regular.ttf

    - family: RadioCanadaBig-SemiBold
      fonts:
        - asset: assets/fonts/RadioCanadaBig-SemiBold.ttf