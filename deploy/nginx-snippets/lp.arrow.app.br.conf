# lp.arrow.app.br — Landing Panel (estático)
# Document root: /www/wwwroot/lp.arrow.app.br

server {
    listen 443 ssl http2;
    server_name lp.arrow.app.br;

    root /www/wwwroot/lp.arrow.app.br;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
