# store.arrow.app.br — Store Panel (Laravel)
# Document root: /www/wwwroot/store.arrow.app.br/public
#
# aaPanel → Website → Running directory = /public
#   (painel grava root = /www/wwwroot/store.arrow.app.br/public)
# Se Running directory = / (raiz), nginx aponta para pasta sem index → 403 plain nginx
#
# open_basedir (CRÍTICO no aaPanel):
#   CORRETO: /www/wwwroot/store.arrow.app.br/:/tmp/
#   ERRADO:  /www/wwwroot/store.arrow.app.br/public/:/tmp/
#   fastcgi_param PHP_ADMIN_VALUE "open_basedir=/www/wwwroot/store.arrow.app.br/:/tmp/";

server {
    listen 443 ssl http2;
    server_name store.arrow.app.br;

    root /www/wwwroot/store.arrow.app.br/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
