# arrow.app.br — Website Panel (Laravel)
# Document root: /www/wwwroot/arrow_app_br/public

server {
    listen 443 ssl http2;
    server_name arrow.app.br;

    root /www/wwwroot/arrow_app_br/public;
    index index.php index.html;

    # SSL: configurado pelo aaPanel (Let's Encrypt)

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
