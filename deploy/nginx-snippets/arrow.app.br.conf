# arrow.app.br — Website Panel (Laravel)
# Document root: /www/wwwroot/arrow.app.br/public
#
# open_basedir (CRÍTICO no aaPanel):
#   Laravel precisa ler vendor/, storage/, bootstrap/ na RAIZ do site.
#   No aaPanel → Site → PHP → open_basedir:
#     CORRETO: /www/wwwroot/arrow.app.br/:/tmp/
#     ERRADO:  /www/wwwroot/arrow.app.br/public/:/tmp/
#   Sintoma se errado: vendor/autoload.php — open_basedir restriction in effect
#
# Se o aaPanel injetar open_basedir no vhost nginx, use a raiz do site:
#   fastcgi_param PHP_ADMIN_VALUE "open_basedir=/www/wwwroot/arrow.app.br/:/tmp/";

server {
    listen 443 ssl http2;
    server_name arrow.app.br;

    root /www/wwwroot/arrow.app.br/public;
    index index.php index.html;

    # SSL: configurado pelo aaPanel (Let's Encrypt)

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
